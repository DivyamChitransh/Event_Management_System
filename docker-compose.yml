version: "3"

services:
  app:
    build: .
    ports:
      - "8800:8800"
    environment:
      PORT: 8800
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: event_booking_system
      DB_PORT: 3306
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_booking_system
    ports:
      - "3307:3306"